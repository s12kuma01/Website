version: 2
updates:
  # npm ecosystem covers the pnpm-lock.yaml lockfile.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # One grouped PR for routine minor/patch bumps to keep noise down;
      # majors still come as individual PRs so they can be reviewed carefully.
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the Actions used by the workflows above current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        update-types:
          - minor
          - patch
