name: Deploy

# Build and publish to Cloudflare Workers static assets.
# Triggered by pushing a release tag (1.0.0, 1.0, 2.3.1, ...) — the tag you push
# after the "chore(release): bump version to X" commit — or by a manual run.
# Ordinary pushes to main run CI but are NOT deployed.
# Requires two repository secrets:
#   CLOUDFLARE_API_TOKEN   - a token with "Workers Scripts: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID  - your Cloudflare account id
on:
  push:
    tags:
      - '[0-9]*' # unprefixed version tags: 1.0.0, 1.0, 2.3.1, ... (must start with a digit)
  workflow_dispatch:

permissions:
  contents: read

# Never run two production deploys at once; queue rather than cancel so an
# in-flight deploy is allowed to finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (gen tokens + astro build)
        run: pnpm build

      - name: Deploy (wrangler)
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
